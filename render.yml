services:
  - type: web
    name: hjarne-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: hjarne-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: hjarne-redis
          type: redis
          property: connectionString
      - key: JWT_PRIVATE_KEY
        sync: false
      - key: JWT_PUBLIC_KEY
        sync: false
      - key: JWT_ACCESS_EXPIRY_SECONDS
        value: "86400"
      - key: JWT_REFRESH_EXPIRY_DAYS
        value: "7"
      - key: DAILY_API_KEY
        sync: false
      - key: DAILY_DOMAIN
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: APP_HOST
        value: "0.0.0.0"
      - key: APP_PORT
        value: "3000"
      - key: APP_BASE_URL
        sync: false
      - key: RUST_LOG
        value: info

  - type: redis
    name: hjarne-redis
    plan: free
    ipAllowList: []

databases:
  - name: hjarne-db
    databaseName: hjarne_db
    user: hjarne
    plan: free