
services:
  - type: web
    name: hjarne-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    dockerContext: .
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_PRIVATE_KEY
        sync: false
      - key: JWT_PUBLIC_KEY
        sync: false
      - key: JWT_ACCESS_EXPIRY_SECONDS
        value: "86400"
      - key: JWT_REFRESH_EXPIRY_DAYS
        value: "7"
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: DAILY_API_KEY
        sync: false
      - key: DAILY_DOMAIN
        sync: false
      - key: APP_BASE_URL
        sync: false
      - key: RUST_LOG
        value: info
