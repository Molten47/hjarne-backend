services:
  postgres:
    image: postgres:16-alpine
    container_name: hjarne_postgres
    environment:
      POSTGRES_USER: hjarne
      POSTGRES_PASSWORD: hjarne_dev_password
      POSTGRES_DB: hjarne_db
    ports:
      - "5432:5432"
    volumes:
      - hjarne_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: hjarne_redis
    ports:
      - "6379:6379"

volumes:
  hjarne_pgdata: